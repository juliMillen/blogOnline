version: '3'

services:
  app:
    build: .
    container_name: blog_app
    mem_limit: 512m
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/blogDB
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 42576661
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16
    container_name: blog_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: blogDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 42576661
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5


